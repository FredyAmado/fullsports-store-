<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - FullSports</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo">FULL<span>SPORTS</span></a>
      <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);font-weight:600;">Panel Admin</div>
      <a href="../index.html" style="font-size:14px;color:var(--gray-500);">← Volver a tienda</a>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="logo">FULL<span>SPORTS</span></div>
      <nav class="admin-nav">
        <a href="index.html" class="active">📊 Dashboard</a>
        <a href="products.html">🏷️ Productos</a>
        <a href="orders.html">📦 Pedidos</a>
        <a href="../index.html">← Tienda</a>
      </nav>
    </aside>

    <main class="admin-main">
      <h1>Dashboard</h1>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Total productos</div>
          <div class="value" id="statProducts">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Pedidos totales</div>
          <div class="value" id="statOrders">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Ingresos totales</div>
          <div class="value" id="statRevenue">$0</div>
        </div>
        <div class="stat-card">
          <div class="label">Stock bajo</div>
          <div class="value" id="statLowStock">0</div>
        </div>
      </div>

      <h2 style="font-family:var(--font-display);font-size:28px;letter-spacing:1px;margin-bottom:16px;">Pedidos recientes</h2>
      <table class="admin-table" id="recentOrders">
        <thead>
          <tr><th>Pedido</th><th>Cliente</th><th>Fecha</th><th>Total</th><th>Estado</th><th></th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
