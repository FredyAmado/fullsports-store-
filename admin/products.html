<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Admin FullSports</title>
  <link rel="stylesheet" href="../css/style.css?v=2">
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo">FULL<span>SPORTS</span></a>
      <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);font-weight:600;">Panel Admin</div>
      <a href="../index.html" style="font-size:14px;color:var(--gray-500);">← Volver a tienda</a>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="logo">FULL<span>SPORTS</span></div>
      <nav class="admin-nav">
        <a href="index.html">📊 Dashboard</a>
        <a href="products.html" class="active">📦 Productos</a>
        <a href="orders.html">📦 Pedidos</a>
        <a href="../index.html">← Tienda</a>
        <a href="#" onclick="logoutAdmin()" style="color:#dc3545;">🚪 Salir</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-toolbar">
        <h1>Productos</h1>
        <button class="btn btn-black" id="addProductBtn">+ Nuevo producto</button>
      </div>

      <table class="admin-table" id="productTable">
        <thead>
          <tr><th></th><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Estado</th><th>Acciones</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="btn-close" onclick="closeModal()">✕</button>
      <h2 id="modalTitle">Nuevo producto</h2>
      <form id="productForm">
        <input type="hidden" id="productId" value="">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="productName" required>
        </div>
        <div class="form-group">
          <label>Categoría</label>
          <select id="productCategory">
            <option value="zapatos">Zapatos</option>
            <option value="ropa">Ropa</option>
            <option value="futbol">Fútbol</option>
            <option value="pesas">Pesas</option>
            <option value="accesorios">Accesorios</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Precio ($)</label>
            <input type="number" id="productPrice" step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label>Precio anterior ($)</label>
            <input type="number" id="productOldPrice" step="0.01" min="0" placeholder="Opcional">
          </div>
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <textarea id="productDescription" rows="3" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Emoji / imagen URL</label>
            <input type="text" id="productImage" placeholder="Ej: images/product-1.png">
          </div>
          <div class="form-group">
            <label>Stock</label>
            <input type="number" id="productStock" min="0" value="0">
          </div>
        </div>
        <button type="button" class="btn btn-black" id="saveProductBtn">Guardar producto</button>
      </form>
    </div>
  </div>

  <script src="../js/app.js?v=2"></script>
  <script src="../js/admin.js?v=2"></script>
</body>
</html>
